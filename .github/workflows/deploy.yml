name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-python-app:${{ github.sha }}

      - name: Update GitOps Repo
        env:
          PAT: ${{ secrets.GIT_PAT }}
        run: |
          # 1. Clone the GitOps Repo
          git clone https://x-access-token:${PAT}@github.com/${{ secrets.DOCKERHUB_USERNAME }}/my-python-app-gitops.git
          cd my-python-app-gitops
          
          # 2. Update the image tag in values.yaml
          # We use sed to find 'tag:' and replace the value with the new commit hash
          sed -i "s|tag:.*|tag: \"${{ github.sha }}\"|" values.yaml
          
          # 3. Commit and Push
          git config user.name "GitHub Action"
          git config user.name "action@github.com"
          git add values.yaml
          git commit -m "Update image to ${{ github.sha }}"
          git push
